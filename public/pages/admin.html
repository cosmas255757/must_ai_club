<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - User Management</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <nav class="main-nav">
    <div class="nav-container">
        <a href="/profile" class="logo">MUST AI Club</a>
        <ul id="nav-links">
            <li><a href="/profile">My Profile</a></li>
            <!-- Admin links will be injected here -->
        </ul>
        <div class="nav-auth">
            <span id="nav-username"></span>
            <button id="nav-logout-btn" class="btn-logout">Logout</button>
        </div>
    </div>
</nav>

    <div class="admin-container">
        <h2>Member Management</h2>
        <table id="userTable">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userList">
                <!-- Users will be injected here by JS -->
            </tbody>
        </table>
    </div>

    <div class="admin-panel">
    <h2>All Club Members</h2>
    <div id="userListContainer">
        <table border="1" id="membersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Full Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Joined Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="membersBody">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>
</div>

    <script src="../js/admin.js"></script>
    <script src="../js/navbar.js"></script>
</body>
</html>
