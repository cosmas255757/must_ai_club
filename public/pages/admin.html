<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MUST AI Club</title>
    <link rel="stylesheet" href="../css/admin.css">
    <!-- Google Fonts for better readability -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- 1. NAVIGATION BAR -->
    <nav class="main-nav">
        <div class="nav-container">
            <a href="/profile" class="logo">MUST AI Club</a>
            <ul id="nav-links">
                <li><a href="/profile">My Profile</a></li>
                <!-- Admin links will be injected here via navbar.js -->
            </ul>
            <div class="nav-auth">
                <span id="nav-username"></span>
                <button id="nav-logout-btn" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <!-- 2. MAIN ADMIN CONTENT -->
    <div class="admin-container">
        <header class="admin-header">
            <h2 id="headerti">Member Management</h2>
            <p>Overview of all registered club members and their access status.</p>

            <!-- SEARCH INTERFACE -->
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="memberSearch" placeholder="Search by Name, Email, or Student ID..." autocomplete="off">
            </div>
        </header>

        <!-- 3. DATA TABLE -->
        <div class="table-responsive">
            <table id="membersTable">
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Student ID</th>
                        <th>Phone Number</th>
                        <th>Joined Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminMembersBody">
                    <!-- Data is injected here by renderUsers() in admin.js -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 4. SCRIPTS -->
    <script src="../js/navbar.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
