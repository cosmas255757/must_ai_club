<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MUST AI Club</title>
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
   <nav class="main-nav">
    <div class="nav-container">
        <a href="/profile" class="logo">MUST AI Club</a>
        <ul id="nav-links">
            <li><a href="/profile">My Profile</a></li>
            <!-- Admin links will be injected here -->
        </ul>
        <div class="nav-auth">
            <span id="nav-username"></span>
            <button id="nav-logout-btn" class="btn-logout">Logout</button>
        </div>
    </div>
</nav>

    <div class="profile-container">
        <header>
            <h2>User Profile</h2>
        </header>

        <div id="loading">Loading profile data...</div>

        <div id="profileContent" style="display: none;">
            <div class="info-group">
                <label>Full Name:</label>
                <p id="full_name"></p>
            </div>
            <div class="info-group">
                <label>Username:</label>
                <p id="username"></p>
            </div>
            <div class="info-group">
                <label>Email:</label>
                <p id="email"></p>
            </div>
            <div class="info-group">
                <label>Department:</label>
                <p id="department">Not set</p>
            </div>
            <div class="info-group">
                <label>Bio:</label>
                <p id="bio">No bio provided</p>
            </div>
            <div class="info-group">
                <label>Roles:</label>
                <p id="roles" style="font-weight: bold; color: #007bff;"></p>
            </div>
        </div>

        <p id="error" class="error" style="color: red; display: none;"></p>
    </div>

    <!-- Edit Profile Modal -->
<div id="editModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);">
    <div class="modal-content" style="background: white; margin: 10% auto; padding: 20px; width: 400px; border-radius: 8px;">
        <h3>Update Profile</h3>
        <form id="editProfileForm">
            <input type="text" id="edit_full_name" placeholder="Full Name" required style="width: 100%; margin-bottom: 10px;">
            <input type="text" id="edit_student_id" placeholder="Student ID Number" style="width: 100%; margin-bottom: 10px;">
            <input type="text" id="edit_department" placeholder="Department" style="width: 100%; margin-bottom: 10px;">
            <input type="url" id="edit_github" placeholder="GitHub URL" style="width: 100%; margin-bottom: 10px;">
            <textarea id="edit_bio" placeholder="Short Bio" style="width: 100%; margin-bottom: 10px;"></textarea>
            
            <button type="submit" id="saveBtn">Save Changes</button>
            <button type="button" onclick="document.getElementById('editModal').style.display='none'">Cancel</button>
        </form>
    </div>
</div>

<!-- Add an Edit Button to your existing profileContent div -->
<button id="openEditBtn" style="margin-top: 10px; background: #28a745; color: white;">Edit Profile</button>


    <script src="../js/profile.js"></script>
    <script src="../js/navbar.js"></script>
</body>
</html>
