<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MUST AI Club</title>
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
   <nav class="main-nav">
    <div class="nav-container">
        <a href="/profile" class="logo">MUST AI Club</a>
        <ul id="nav-links">
            <li><a href="/profile">My Profile</a></li>
            <!-- Admin links will be injected here -->
        </ul>
        <div class="nav-auth">
            <span id="nav-username"></span>
            <button id="nav-logout-btn" class="btn-logout">Logout</button>
        </div>
    </div>
</nav>

<div class="profile-container">
    <header>
        <h2>User Profile</h2>
    </header>

    <div id="loading">Loading profile data...</div>

    <div id="profileContent" style="display: none;">
        <!-- Profile Picture (Optional but recommended) -->
        <div class="info-group" id="pic-container" style="display: none;">
            <img id="profile_pic_url" src="" alt="Profile Picture" style="width: 100px; height: 100px; border-radius: 50%;">
        </div>

        <div class="info-group">
            <label>Full Name:</label>
            <p id="full_name"></p>
        </div>
        <div class="info-group">
            <label>Username:</label>
            <p id="username"></p>
        </div>
        <div class="info-group">
            <label>Email:</label>
            <p id="email"></p>
        </div>
        <div class="info-group">
            <label>Student ID Number:</label>
            <p id="student_id_number">N/A</p>
        </div>
        <div class="info-group">
            <label>Phone Number:</label>
            <p id="phone_number"></p>
        </div>
        <div class="info-group">
            <label>Department:</label>
            <p id="department">Not set</p>
        </div>
        <div class="info-group">
            <label>GitHub URL:</label>
            <p id="github_url">Not linked</p>
        </div>
        <div class="info-group">
            <label>Bio:</label>
            <p id="bio">No bio provided</p>
        </div>
        <div class="info-group">
            <label>Roles:</label>
            <p id="roles" style="font-weight: bold; color: #007bff;"></p>
        </div>
        <div class="info-group">
            <label>Permissions:</label>
            <p id="permissions" style="font-style: italic; color: #28a745;"></p>
        </div>
    </div>

    <p id="error" class="error" style="color: red; display: none;"></p>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Update Profile Information</h3>
        <p class="modal-subtitle">Update your core account and AI Club profile details.</p>
        
        <form id="editProfileForm">
            <!-- Core User Fields -->
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="edit_username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="edit_email" placeholder="email@university.edu" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="edit_phone_number" placeholder="Phone Number">
            </div>

            <!-- Profile Fields -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="edit_full_name" placeholder="Full Name">
            </div>

            <div class="form-group">
                <label>Student ID Number</label>
                <input type="text" id="edit_student_id_number" placeholder="University ID">
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" id="edit_department" placeholder="e.g. Computer Science">
            </div>

            <div class="form-group">
                <label>GitHub URL</label>
                <input type="url" id="edit_github_url" placeholder="https://github.com">
            </div>

            <div class="form-group">
                <label>Bio</label>
                <textarea id="edit_bio" placeholder="Tell us about your AI interests..." rows="3"></textarea>
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="document.getElementById('editModal').style.display='none'">Cancel</button>
                <button type="submit" id="saveBtn" class="btn-save">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<button id="openEditBtn" class="btn-edit-trigger">
    Edit Profile Information
</button>


    <script src="../js/profile.js"></script>
    <script src="../js/navbar.js"></script>
</body>
</html>
