<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permission Master List - MUST AI Club</title>
    <link rel="stylesheet" href="../css/permission.css">
</head>
<body>
    <nav class="main-nav">
    <div class="nav-container">
        <a href="/profile" class="logo">MUST AI Club</a>
        <ul id="nav-links">
            <li><a href="/profile">My Profile</a></li>
            <!-- Admin links will be injected here -->
        </ul>
        <div class="nav-auth">
            <span id="nav-username"></span>
            <button id="nav-logout-btn" class="btn-logout">Logout</button>
        </div>
    </div>
</nav>

    <div class="admin-container">
        <header class="admin-header">
            <h1>System Permissions</h1>
            <p>Define global action keys for the MUST AI Club platform.</p>
        </header>

        <!-- Section: Create Permission -->
        <div class="card create-card">
            <h3>Register New Permission Key</h3>
            <form id="createPermissionForm" class="inline-form">
                <input type="text" id="permission_key" placeholder="KEY_NAME (e.g. DATA_UPLOAD)" required>
                <input type="text" id="permission_description" placeholder="What does this allow?">
                <button type="submit" class="btn-primary">Add Key</button>
            </form>
            <p class="hint">Note: Keys are automatically converted to UPPERCASE.</p>
        </div>

        <!-- Section: Permission List -->
        <div class="card">
            <div class="table-header">
                <h3>Active Permission Keys</h3>
                <input type="text" id="permSearch" placeholder="Search keys...">
            </div>
            <div class="permission-list" id="permissionList">
                <div class="loading">Fetching master keys...</div>
            </div>
        </div>
    </div>

    <script src="../js/permissions.js"></script>
    <script src="../js/navbar.js"></script>
</body>
</html>
