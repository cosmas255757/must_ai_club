<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MUST AI Club</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>

    <div class="register-container">
        <h2>MUST AI Club Registration</h2>

        <form id="registerForm">
            <!-- Added Full Name: Required by your user_profiles table -->
            <input type="text" id="full_name" placeholder="Full Name (e.g. John Doe)" required />
            
            <input type="text" id="username" placeholder="Username" required />
            <input type="email" id="email" placeholder="University Email" required />
            
            <!-- Added type="tel" for better mobile support -->
            <input type="tel" id="phone_number" placeholder="Phone Number" required />
            
            <input type="password" id="password" placeholder="Password" required />
            
            <button type="submit" id="submitBtn">Register</button>
        </form>

        <!-- Separate areas for messages -->
        <p id="error" class="error" style="color: red; display: none;"></p>
        <p id="success" class="success" style="color: green; display: none;"></p>
        
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
