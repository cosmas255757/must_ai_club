<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBAC Management - MUST AI Club</title>
    <link rel="stylesheet" href="../css/roles.css">
    <style>
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 15px; border-radius: 5px; color: white; display: none; z-index: 1000; }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        .mt-2 { margin-top: 20px; }
        .small-text { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="/profile" class="logo">MUST AI Club</a>
            <ul id="nav-links">
                <li><a href="/profile">My Profile</a></li>
            </ul>
            <div class="nav-auth">
                <span id="nav-username"></span>
                <button id="nav-logout-btn" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <main class="admin-container">
        <header class="admin-header">
            <h1>Role & Permission Control</h1>
            <p>Configure system-wide access levels and action keys.</p>
        </header>

        <section class="admin-content-grid">
            <!-- Sidebar: Two Forms -->
            <aside class="sidebar-forms">
                
                <!-- 1. CREATE ROLE FORM -->
                <div class="card create-card">
                    <h3>Add New Role</h3>
                    <form id="createRoleForm" class="role-form">
                        <div class="form-group">
                            <label for="role_name">Role Name</label>
                            <input type="text" id="role_name" placeholder="e.g. AI_MENTOR" required>
                        </div>
                        <div class="form-group">
                            <label for="role_description">Description</label>
                            <textarea id="role_description" placeholder="What does this role do?" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Create Role</button>
                    </form>
                </div>

                <!-- 2. NEW: CREATE SYSTEM PERMISSION FORM -->
                <div class="card create-card mt-2">
                    <h3>Add System Permission</h3>
                    <p class="small-text">Define a new action key (e.g., GPU_ACCESS).</p>
                    <form id="createPermissionForm" class="role-form">
                        <div class="form-group">
                            <label for="perm_key">Permission Key</label>
                            <input type="text" id="perm_key" placeholder="e.g. DATASET_DELETE" required>
                        </div>
                        <div class="form-group">
                            <label for="perm_description">Description</label>
                            <input type="text" id="perm_description" placeholder="Allows deleting files">
                        </div>
                        <button type="submit" class="btn-secondary">Add Permission</button>
                    </form>
                </div>

            </aside>

            <!-- Main: Roles List -->
            <section class="roles-section">
                <div class="section-header">
                    <h3>Existing Roles</h3>
                    <button class="btn-refresh" id="refreshRoles">Refresh List</button>
                </div>
                <div class="roles-grid" id="rolesList">
                    <div class="loading">Loading roles...</div>
                </div>
            </section>
        </section>
    </main>

    <!-- MODAL: Manage Permissions for a specific role -->
    <div id="permissionModal" class="modal" aria-hidden="true" style="display: none;">
        <div class="modal-content">
            <header class="modal-header">
                <div>
                    <h3 id="modalRoleTitle">Manage Permissions</h3>
                    <small id="modalRoleNameDisplay"></small>
                </div>
                <span class="close-btn" id="closeModalBtn" role="button">&times;</span>
            </header>
            
            <div class="modal-body">
                <p>Toggle permissions for this role:</p>
                <form id="permissionsChecklist" class="checklist">
                    <!-- Dynamic checkboxes here -->
                </form>
            </div>

            <footer class="modal-footer">
                <button type="button" class="btn-cancel" id="cancelModalBtn">Cancel</button>
                <button type="button" class="btn-save" id="savePermissionsBtn">Save Changes</button>
            </footer>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../js/navbar.js"></script>
    <script src="../js/roles.js"></script>
</body>
</html>
