<!DOCTYPE html>
<html lang="en">

    <title>Facilitator Dashboard</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav>

    <main>

        document.getElementById("welcome-msg").innerText = `Welcome, Facilitator ${user.name}`;

</html>
