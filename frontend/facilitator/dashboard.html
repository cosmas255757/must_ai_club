<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facilitator Dashboard - MUST AI HUB</title>
    <style>
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .stat-val { font-size: 2rem; font-weight: 800; color: #1e1b4b; }
        .stat-label { color: #64748b; font-size: 0.9rem; margin-top: 5px; }

        .pending-list { background: white; border-radius: 20px; padding: 25px; border: 1px solid #e2e8f0; }
        .pending-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .btn-action { background: #818cf8; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 0.8rem; }
    </style>
    <script src="../js/guard.js"></script>
</head>
<body>

    <header style="margin-bottom: 30px;">
        <h1 id="welcome-text">Welcome, Facilitator</h1>
        <p>You have <strong>5 projects</strong> waiting for your review today.</p>
    </header>

    <div class="stats-row">
        <div class="card">
            <div class="stat-val">12</div>
            <div class="stat-label">Active Students</div>
        </div>
        <div class="card">
            <div class="stat-val" style="color: #f59e0b;">05</div>
            <div class="stat-label">Pending Reviews</div>
        </div>
        <div class="card">
            <div class="stat-val" style="color: #10b981;">03</div>
            <div class="stat-label">Published Courses</div>
        </div>
    </div>

    <div class="pending-list">
        <h2>Recent Submissions</h2>
        <div class="pending-item">
            <div>
                <strong>John Doe</strong><br>
                <small>Image Classifier - CNN</small>
            </div>
            <a href="review-projects" class="btn-action">Grade Now</a>
        </div>
        <div class="pending-item">
            <div>
                <strong>Alice Smith</strong><br>
                <small>Chatbot with NLP</small>
            </div>
            <a href="review-projects" class="btn-action">Grade Now</a>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if(user) document.getElementById("welcome-text").innerText = `Welcome, ${user.name}`;
    </script>
    <script src="../js/facilitator_layout.js"></script>
</body>
</html>
