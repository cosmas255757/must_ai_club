<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - MUST AI HUB</title>
    <style>
        /* Existing Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            max-width: 850px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-out;
        }

        .profile-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .profile-banner {
            height: 140px;
            background: linear-gradient(135deg, #0f172a 0%, #ef4444 100%);
        }

        .profile-header-content {
            padding: 0 40px 30px;
            margin-top: -60px;
            display: flex;
            align-items: flex-end;
            gap: 25px;
        }

        .avatar-box {
            width: 120px;
            height: 120px;
            background: white;
            border: 6px solid #f8fafc;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .header-text h2 {
            margin: 0;
            color: #0f172a;
            font-size: 2rem;
        }

        .header-text p {
            margin: 5px 0 0;
            color: #ef4444;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 40px 40px;
        }

        .info-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
        }

        .info-card label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .info-card span {
            font-size: 1.05rem;
            color: #0f172a;
            font-weight: 600;
            word-break: break-all;
        }

        .profile-actions {
            padding: 0 40px 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #0f172a;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: white;
            color: #ef4444;
            padding: 12px 25px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-danger:hover {
            background: #fef2f2;
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: transparent;
            border: none;
            color: #64748b;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
    
</head>

<body>
    <div class="profile-container">
        <header style="margin-bottom: 25px;">
            <h1>Root Administrator</h1>
            <p style="color: #64748b;">Manage your system credentials and authentication settings.</p>
        </header>

        <div class="profile-card">
            <div class="profile-banner"></div>

            <div class="profile-header-content">
                <div class="avatar-box">🛡️</div>
                <div class="header-text">
                    <h2 id="adm-name">Loading Admin...</h2>
                    <p id="adm-role-badge">System Root</p>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <label>Admin Email</label>
                    <span id="adm-email">---</span>
                </div>
                <div class="info-card">
                    <label>System UUID</label>
                    <span id="adm-id">---</span>
                </div>
                <div class="info-card">
                    <label>Access Level</label>
                    <span id="adm-access-level" style="color: #ef4444;">● Superuser (Full)</span>
                </div>
                <div class="info-card">
                    <label>Platform Status</label>
                    <span id="adm-status">v1.0.4 Stable</span>
                </div>
            </div>

            <div class="profile-actions">
                <button id="btn-update-details" class="btn-primary">Update Admin Details</button>
                <button id="btn-reset-password" class="btn-danger">Reset Root Password</button>
            </div>
        </div>
    </div>

    <!-- Update Profile Modal -->
    <div id="modal-update" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Update Admin Profile</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="input-new-name" placeholder="Enter new name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="input-new-email" placeholder="Enter new email">
            </div>
            <div class="modal-footer">
                <button onclick="closeModals()" class="btn-ghost">Cancel</button>
                <button id="save-profile-btn" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div id="modal-password" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Reset Root Password</h3>
            <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 15px;">Enter a secure password (min 8 characters).</p>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="input-new-pass" placeholder="••••••••">
            </div>
            <div class="modal-footer">
                <button onclick="closeModals()" class="btn-ghost">Cancel</button>
                <button id="save-password-btn" class="btn-danger">Update Password</button>
            </div>
        </div>
    </div>

    <script src="../js/adminProfile.js">
    </script>
    <!-- <script src="../js/admin_layout.js"></script> -->
    <!-- <script src="../js/guard.js"></script> -->
</body>
</html>
