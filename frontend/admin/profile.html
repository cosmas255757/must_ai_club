<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - MUST AI HUB</title>
    <style>
        .profile-container {
            max-width: 850px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-out;
        }

        /* Profile Banner & Header */
        .profile-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .profile-banner {
            height: 140px;
            background: linear-gradient(135deg, #0f172a 0%, #ef4444 100%);
        }

        .profile-header-content {
            padding: 0 40px 30px;
            margin-top: -60px;
            display: flex;
            align-items: flex-end;
            gap: 25px;
        }

        .avatar-box {
            width: 120px;
            height: 120px;
            background: white;
            border: 6px solid #f8fafc;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .header-text h2 {
            margin: 0;
            color: #0f172a;
            font-size: 2rem;
        }

        .header-text p {
            margin: 5px 0 0;
            color: #ef4444;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        /* Information Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 40px 40px;
        }

        .info-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
        }

        .info-card label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .info-card span {
            font-size: 1.05rem;
            color: #0f172a;
            font-weight: 600;
            word-break: break-all;
        }

        /* Action Buttons */
        .profile-actions {
            padding: 0 40px 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #0f172a;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: white;
            color: #ef4444;
            padding: 12px 25px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-danger:hover {
            background: #fef2f2;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
    <script src="../js/guard.js"></script>
</head>

<body>
    <div class="profile-container">
        <header style="margin-bottom: 25px;">
            <h1>Root Administrator</h1>
            <p style="color: #64748b;">Manage your system credentials and authentication settings.</p>
        </header>

        <div class="profile-card">
            <div class="profile-banner"></div>

            <div class="profile-header-content">
                <div class="avatar-box">🛡️</div>
                <div class="header-text">
                    <h2 id="adm-name">Loading Admin...</h2>
                    <p id="adm-role-badge">System Root</p>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <label>Admin Email</label>
                    <span id="adm-email">---</span>
                </div>
                <div class="info-card">
                    <label>System UUID</label>
                    <span id="adm-id">---</span>
                </div>
                <div class="info-card">
                    <label>Access Level</label>
                    <span id="adm-access-level" style="color: #ef4444;">● Superuser (Full)</span>
                </div>
                <div class="info-card">
                    <label>Platform Status</label>
                    <span id="adm-status">v1.0.4 Stable</span>
                </div>
            </div>

            <div class="profile-actions">
                <button id="btn-update-details" class="btn-primary">Update Admin Details</button>
                <button id="btn-reset-password" class="btn-danger">Reset Root Password</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const userData = localStorage.getItem("user");
            if (userData) {
                const user = JSON.parse(userData);
                document.getElementById("adm-name").textContent = user.name || "N/A";
                document.getElementById("adm-email").textContent = user.email || "N/A";
                document.getElementById("adm-id").textContent = user.id || "---";
                document.getElementById("adm-role-badge").textContent = `Official ${user.role?.toUpperCase() || 'ADMIN'}`;
            }
        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("token");

            if (!token) {
                window.location.href = "/login.html";
                return;
            }

            try {
                const response = await fetch('/api/auth/admin/profile', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    // FIXED: Accessing result.data directly (not as an array)
                    const user = result.data;

                    document.getElementById("adm-name").textContent = user.name || "N/A";
                    document.getElementById("adm-email").textContent = user.email || "N/A";
                    document.getElementById("adm-id").textContent = user.id || "---";
                    document.getElementById("adm-role-badge").textContent = `Official ${user.role?.toUpperCase()}`;

                    // Matching your DB status (active/suspended)
                    const statusElement = document.getElementById("adm-status");
                    statusElement.textContent = user.status === 'active' ? 'v1.0.4 Stable' : 'Account Suspended';
                    statusElement.style.color = user.status === 'active' ? '#10b981' : '#ef4444';

                    // Optional: Update local storage with fresh data
                    localStorage.setItem("user", JSON.stringify(user));
                } else {
                    console.error("Backend error:", result.message);
                    // If token is invalid or expired, kick to login
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = "/login.html";
                    }
                }
            } catch (error) {
                console.error("Network error:", error);
            }
        });
    </script>

    <script src="../js/admin_layout.js"></script>
</body>

</html>
