<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - Admin Command</title>
    <style>
        /* Base Flex Header */
        .log-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
            gap: 20px;
        }
        
        .log-header h1 { margin: 0; font-size: 1.8rem; color: #0f172a; }

        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }

        /* Terminal Container */
        .terminal-container {
            background: #0f172a;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 1px solid #334155;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1e293b;
            align-items: center;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ef4444; }
        .yellow { background: #f59e0b; }
        .green { background: #10b981; }

        .terminal-path {
            margin-left: 10px; 
            color: #475569; 
            font-size: 0.8rem; 
            font-family: monospace;
        }

        /* Desktop Table View */
        .scroll-wrapper { overflow-x: auto; }

        .log-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-family: 'Fira Code', 'Courier New', monospace; 
        }
        
        .log-table th { 
            text-align: left; 
            color: #64748b; 
            font-size: 0.8rem; 
            padding: 12px; 
            border-bottom: 1px solid #1e293b; 
            text-transform: uppercase;
        }
        
        .log-table td { 
            padding: 12px; 
            color: #94a3b8; 
            font-size: 0.85rem; 
            border-bottom: 1px solid #1e293b; 
        }
        
        .action-text { color: #f8fafc; font-weight: 600; }
        .timestamp { color: #38bdf8; }
        .user-ref { color: #fbbf24; }

        .filter-pill {
            background: #1e293b;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            border: 1px solid #334155;
            cursor: pointer;
        }
        .filter-pill.active { background: #ef4444; color: white; border-color: #ef4444; }
/* Advanced Mobile Log Transformation */
@media (max-width: 768px) {
    /* Hide the standard table header */
    .log-table thead { display: none; }

    /* Transform each row into a standalone card */
    .log-table tr {
        display: grid;
        grid-template-columns: 1fr 1fr; /* Two columns for compact data viewing */
        gap: 12px;
        padding: 20px 0;
        border-bottom: 1px solid rgba(51, 65, 85, 0.5); /* Semi-transparent Slate */
        position: relative;
    }

    /* Make cells block elements */
    .log-table td {
        display: block;
        padding: 0;
        border: none;
        font-size: 0.85rem;
        line-height: 1.4;
    }

    /* Target the Action and Timestamp to span full width for better readability */
    .log-table td:nth-child(1), 
    .log-table td:nth-child(3) {
        grid-column: span 2;
        border-left: 3px solid var(--accent); /* Crimson accent strip */
        padding-left: 12px;
        margin-bottom: 4px;
    }

    /* Advanced Labels using Data Attributes */
    .log-table td::before {
        content: attr(data-label);
        display: block;
        font-family: 'Inter', sans-serif;
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #475569; /* Muted Slate */
        margin-bottom: 4px;
    }

    /* Adjust container spacing */
    .terminal-container { 
        padding: 15px; 
        min-height: auto; 
    }
    
    .log-header {
        flex-direction: column;
        align-items: flex-start;
    }

    .log-header h1 { font-size: 1.4rem; }
}

    </style>
    <script src="../js/guard.js"></script>
</head>
<body>

    <div class="log-header">
        <div>
            <h1>System Audit Logs</h1>
            <p style="color: #64748b;">Real-time tracking of database transactions.</p>
        </div>
        <div class="filter-group">
            <button class="filter-pill active">All Logs</button>
            <button class="filter-pill">Auth</button>
            <button class="filter-pill">Database</button>
        </div>
    </div>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <span class="terminal-path">root@must-ai-hub:~# tail -f logs</span>
        </div>

        <div class="scroll-wrapper">
            <table class="log-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User ID</th>
                        <th>Action Performed</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                    <!-- Added data-label for mobile view -->
                    <tr>
                        <td class="timestamp" data-label="Timestamp">2024-11-20 14:22:01</td>
                        <td class="user-ref" data-label="User ID">usr_8821...</td>
                        <td class="action-text" data-label="Action">USER_REGISTERED</td>
                        <td style="color: #10b981;" data-label="Status">SUCCESS</td>
                    </tr>
                    <tr>
                        <td class="timestamp" data-label="Timestamp">2024-11-20 14:25:45</td>
                        <td class="user-ref" data-label="User ID">adm_0001...</td>
                        <td class="action-text" data-label="Action">USER_SUSPENDED: id_102</td>
                        <td style="color: #10b981;" data-label="Status">SUCCESS</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/admin_layout.js"></script>
</body>
</html>
