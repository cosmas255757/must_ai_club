<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MUST AI HUB</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <main class="contact-container">
        <!-- Left Side: Information -->
        <div class="contact-info reveal-1">
            <span class="badge">GET IN TOUCH</span>
            <h1>Let's Connect <span class="gradient-text">Innovation</span></h1>
            <p>Have questions about courses, sponsorships, or project collaborations? Our team at MUST AI HUB is here to help.</p>
            
            <div class="info-list">
                <div class="info-item">
                    <span class="icon">📍</span>
                    <div>
                        <h3>Our Hub</h3>
                        <p>MUST Main Campus, Mbeya, TZ</p>
                    </div>
                </div>
                <div class="info-item">
                    <span class="icon">📧</span>
                    <div>
                        <h3>Email Us</h3>
                        <p>mustaihub@gmail.ac.tz</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: The Form -->
        <div class="contact-form-wrapper reveal-2">
            <form id="contactForm" class="glass-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Cosmas Samwel" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="cosmas@.com" required>
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" class="btn-glow">Send Message</button>
            </form>
        </div>
    </main>

    <script src="js/navfooter.js"></script>
</body>
</html>
