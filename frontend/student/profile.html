<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - MUST AI HUB</title>
    <link rel="stylesheet" href="../css/student.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/guard.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <h2>MUST AI HUB</h2>
            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="courses.html">Courses</a>
                <a href="events.html">Events</a>
                <a href="projects.html">My Projects</a>
                <a href="profile.html" class="active">Profile</a>
            </nav>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </aside>

        <main class="main-content">
            <h1>My Profile</h1>
            <div class="card" style="max-width: 600px;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="prof-name" disabled>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="prof-email" disabled>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="prof-role" disabled value="Student">
                </div>
                <div class="form-group">
                    <label>Account Status</label>
                    <span class="status-badge" style="background: #55efc4;">Active</span>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/utils.js"></script>
</body>
</html>
